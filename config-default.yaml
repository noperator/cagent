# Workspace .membrane.yaml entries are appended to the global list, not
# replaced. This applies to all list keys: ignore, readonly, allow, and args.

# `dns_resolver` is the upstream DNS resolver used by the handler's dns-proxy.
# Defaults to 1.1.1.1 if not set.
dns_resolver:

# `ignore` lists patterns matched against filenames or relative paths.
# Matching files and directories are shadowed with an empty placeholder
# inside the container — the agent can see they exist but cannot read
# their contents.
ignore:
  - "*.bak"
  - "*.tmp"

# `readonly` lists patterns mounted into the container as read-only. Use
# this for things like .git (so the agent can read history but not
# rewrite it) or credential files that should be visible but not
# writable.
readonly:
  - .git
  - .env
  - .membrane.yaml

# `allow` lists what the agent is allowed to reach. Each entry is
# auto-detected from its value:
#   IP address  → /32 CIDR, any port
#   CIDR        → CIDR range, any port
#   hostname    → DNS-resolved, any port
#   URL         → DNS-resolved, port from URL, L7 enforcement via mitmproxy
#
# Object form is also supported:
#   - dest: hostname
#     ports: [80, 443]
#   - dest: https://api.example.com
#     http:
#       - methods: [POST]
#         paths:
#           - messages        # relative to URL path: /v1/messages
#           - /other/path     # absolute path
allow:
  # Anthropic
  - api.anthropic.com
  - sentry.io
  - statsig.anthropic.com
  - statsig.com

  # Node.js/npm
  - registry.npmjs.org
  - deb.nodesource.com

  # Python packages
  - pypi.org
  - files.pythonhosted.org

  # Go packages
  - dl.google.com
  - go.dev
  - golang.org
  - google.golang.org
  - gopkg.in
  - goproxy.io
  - pkg.go.dev
  - proxy.golang.org
  - storage.googleapis.com
  - sum.golang.org

  # Rust packages
  - crates.io
  - static.crates.io
  - index.crates.io

  # Ubuntu/Debian packages
  - archive.ubuntu.com
  - security.ubuntu.com
  - ports.ubuntu.com

  # Ubuntu PPAs (deadsnakes, golang-backports, etc.)
  - ppa.launchpadcontent.net
  - launchpad.net

  # GitHub
  - github.com
  - api.github.com
  - codeload.github.com
  - raw.githubusercontent.com
  - objects.githubusercontent.com

  # GitLab
  - gitlab.com

  # Bitbucket
  - bitbucket.org

  # OpenAI
  - api.openai.com

  # OpenRouter
  - openrouter.ai

  # Docker Hub
  - registry-1.docker.io
  - auth.docker.io
  - production.cloudflare.docker.com
  - docker-images-prod.6aa30f8b08e16409b46e0173d6de2f56.r2.cloudflarestorage.com
  - hub.docker.com

  # Cloudflare
  - cloudflare-dns.com

  # AWS STS
  - sts.amazonaws.com

  # AWS Bedrock - North America
  - bedrock-runtime.us-east-1.amazonaws.com
  - bedrock.us-east-1.amazonaws.com
  - bedrock-runtime.us-east-2.amazonaws.com
  - bedrock.us-east-2.amazonaws.com
  - bedrock-runtime.us-west-1.amazonaws.com
  - bedrock.us-west-1.amazonaws.com
  - bedrock-runtime.us-west-2.amazonaws.com
  - bedrock.us-west-2.amazonaws.com

# `args` lists raw arguments appended to the `docker run` command that
# launches the agent container. Use this to pass environment variables,
# additional mounts, port mappings, or anything else accepted by
# `docker run`. Environment variables are expanded ($VAR, ${VAR})
# anywhere in a value, including mid-string (e.g. MY_PATH=$HOME/mydir).
# Shell command substitution ($(...)) is not supported — set secrets in
# your shell environment first and reference them here. Values are
# passed directly to `docker run` without shell interpretation. Do not
# add shell-style quoting around values — quotes are treated as literal
# characters. Each flag and its argument must be separate list items.
args:
